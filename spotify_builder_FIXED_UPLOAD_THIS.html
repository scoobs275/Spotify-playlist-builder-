<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>90s Spotify Playlist Builder</title><style>body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif;background:#0b0b0d;color:#f5f5f7;margin:0;padding:24px;max-width:820px;margin:auto}.card{background:#1c1c1e;border:1px solid #3a3a3c;border-radius:18px;padding:18px;margin:18px 0}input{box-sizing:border-box;width:100%;padding:14px;border-radius:12px;border:1px solid #636366;background:#050506;color:#fff;font-size:16px}button{width:100%;border:0;border-radius:14px;padding:16px;margin:10px 0;font-size:18px;font-weight:800}.green{background:#1db954;color:#061006}.red{background:#ff696e;color:#150000}.white{background:#eee;color:#111}pre{white-space:pre-wrap;word-break:break-word;background:#050506;border:1px solid #2c2c2e;border-radius:12px;padding:14px;font-size:14px;line-height:1.35}label{display:block;font-weight:700;margin:14px 0 8px}p{color:#c7c7cc}.small{font-size:13px;color:#aaa}</style></head><body><h1>90s Spotify Playlist Builder</h1><p>Creates three private Spotify playlists: 1992, 1993 and 1994.</p><div class=card><h2>1. Spotify App Details</h2><label>Spotify Client ID</label><input id=clientId placeholder="Paste your Client ID here"><label>Redirect URI</label><input id=redirectUri readonly><p class=small>Put this exact Redirect URI into Spotify Developer settings.</p><button class=white onclick=copyRedirect()>Copy Redirect URI</button></div><div class=card><h2>2. Connect Spotify</h2><button class=green onclick=login()>Log in to Spotify</button><p id=loginStatus class=small></p></div><div class=card><h2>3. Create Playlists</h2><button class=green onclick=createAll()>Create the 3 Spotify playlists</button><button class=red onclick=resetLogin()>Reset saved login</button><pre id=log>Waiting.</pre></div><script>
const playlists=[
{name:"Two Minutes in 1992",tracks:[["Beastie Boys","So What'cha Want"],["Shabba Ranks","Mr. Loverman (New World Mix)"],["The Pharcyde","Passin' Me By"],["Kool G Rap & DJ Polo","Ill Street Blues"],["Arrested Development","People Everyday (Metamorphosis Mix)"],["Gang Starr feat. Jeru The Damaja & Lil' Dap","I'm The Man"],["Chaka Demus & Pliers","Murder She Wrote"],["Macka B","Roots Ragga"],["Miles Davis","Chocolate Chip"],["Naughty By Nature","Hip Hop Hooray"],["Ultramagnetic MCs","Poppa Large (East Coast Mix)"],["Prince & The New Power Generation","Sexy M.F."],["Loose Ends","Hangin' On A String (Frankie Knuckles Remix)"],["Umosia","Love Don't Let Me Down (Primal Auto Soul Mix)"],["Aly-Us","Follow Me"],["Clivilles & Cole feat. Deborah Cooper","A Deeper Love"],["Ten City","My Peace of Heaven"],["Sergio Mendes","Magalenha"],["Third World","Give The People What They Need"],["Rage Against The Machine","Killing In The Name"],["Cajmere","Percolator"],["Jaydee","Plastic Dreams"],["808 State feat. UB40","One In Ten (UB40 Vocal Mix)"],["Liquid","Sweet Harmony"],["SL2","On A Ragga Tip"],["The Prodigy","Out Of Space"]]},
{name:"Two Minutes in 1993",tracks:[["Wu-Tang Clan","C.R.E.A.M."],["Jeru The Damaja","Come Clean"],["Snoop Dogg","Gz and Hustlas"],["A Tribe Called Quest feat. Trugoy the Dove","Award Tour"],["Tha Alkaholiks","Make Room"],["Digable Planets","Rebirth Of Slick (Cool Like Dat)"],["Mad Kap","Dopest Verse"],["Ice Cube feat. Das EFX","Check Yo Self"],["Cypress Hill","Insane In The Brain"],["Notorious B.I.G.","Party And Bullshit"],["Souls Of Mischief","93 'Til Infinity"],["The Jungle Brothers","40 Below Trooper"],["Salt-N-Pepa","Shoop"],["Louchie Lou & Michie One","Rich Girl"],["General Levy","Champagne Body"],["Chaka Demus & Pliers","One Nation Under A Groove"],["Volcano","Vanonyana Lava"],["Daniel Wang","Like Some Dream (I Can't Stop Dreaming)"],["Robin S","Show Me Love (Stonebridge Club Mix)"],["Hardrive feat. Barbara Tucker","Deep Inside"],["Dajae feat. Cajmere","U Got Me Up (Danny Tenaglia's Club Version)"],["House Of Gypsies","Sume Sigh Say (The Masters Remix)"],["SMD","SMD #1A"],["LTJ Bukem","Music (Happy Raw)"],["Origin Unknown","Valley of The Shadows"]]},
{name:"Two Minutes in 1994",tracks:[["Dawn Penn","You Don't Love Me (No, No, No)"],["Sabres Of Paradise","Wilmot Meets Lord Scruffage"],["Mary J. Blige","Mary Jane (All Night Long)"],["Pete Rock & C.L. Smooth","I Got A Love"],["The Lady Of Rage","Afro Puffs"],["Nas","Represent"],["Charizma & Peanut Butter Wolf","Just Like A Test"],["Eight From The Egg","Black Milk"],["Digable Planets feat. Jazzy Joyce","9th Wonder (Blackitolism)"],["Warren G. & Nate Dogg","Regulate"],["A.D.O.R.","One For The Trouble (Drumapella)"],["Beastie Boys","Sure Shot"],["Dream Warriors","Are We There Yet?"],["Sharlene Boodram","Chamkay 'D' Chutney"],["IO","Claire"],["Kenny Dope presents The Bucketheads","Whew"],["Janet Rushmore","Joy (Choice Mix)"],["Mood II Swing presents Loni Clark","Love's Got Me On A Trip So High (Time Mix)"],["Barbara Tucker","Beautiful People"],["MD-X-Spress","God Made Me Phunky"],["Primal Scream","Rocks"],["Baby D","Let Me Be Your Fantasy"],["The Prodigy","No Good (Start The Dance)"],["SMD","SMD3"],["M-Beat feat. General Levy","Incredible"]]}];
const redirectUri=location.origin+location.pathname;document.getElementById("redirectUri").value=redirectUri;document.getElementById("clientId").value=localStorage.getItem("spotify_client_id")||"";
function setLog(x){document.getElementById("log").textContent=x}function log(x){document.getElementById("log").textContent+="\n"+x}function copyRedirect(){navigator.clipboard.writeText(redirectUri);alert("Redirect URI copied")}function resetLogin(){localStorage.removeItem("spotify_access_token");localStorage.removeItem("spotify_code_verifier");history.replaceState({},document.title,redirectUri);setLog("Login reset. Now tap Log in to Spotify again.");document.getElementById("loginStatus").textContent="Login reset."}
function randStr(n){const c='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';let s='';const a=new Uint8Array(n);crypto.getRandomValues(a);a.forEach(v=>s+=c[v%c.length]);return s}async function sha(t){return crypto.subtle.digest("SHA-256",new TextEncoder().encode(t))}function b64(b){return btoa(String.fromCharCode(...new Uint8Array(b))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'')}
async function login(){const clientId=document.getElementById("clientId").value.trim();if(!clientId){alert("Paste Client ID first");return}localStorage.setItem("spotify_client_id",clientId);const verifier=randStr(96);localStorage.setItem("spotify_code_verifier",verifier);const challenge=b64(await sha(verifier));const params=new URLSearchParams({response_type:"code",client_id:clientId,scope:"playlist-modify-private playlist-modify-public",redirect_uri:redirectUri,code_challenge_method:"S256",code_challenge:challenge,show_dialog:"true"});location.href="https://accounts.spotify.com/authorize?"+params}
async function callback(){const q=new URLSearchParams(location.search);if(!q.has("code")){if(localStorage.getItem("spotify_access_token"))document.getElementById("loginStatus").textContent="Spotify login token found.";return}setLog("Spotify returned auth code. Exchanging token.");const body=new URLSearchParams({grant_type:"authorization_code",code:q.get("code"),redirect_uri:redirectUri,client_id:localStorage.getItem("spotify_client_id")||document.getElementById("clientId").value.trim(),code_verifier:localStorage.getItem("spotify_code_verifier")});const r=await fetch("https://accounts.spotify.com/api/token",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body});const t=await r.text();if(!r.ok){setLog("Token failed: "+t);return}localStorage.setItem("spotify_access_token",JSON.parse(t).access_token);history.replaceState({},document.title,redirectUri);document.getElementById("loginStatus").textContent="Spotify login token found.";setLog("Logged in. Now tap Create the 3 Spotify playlists.")}
async function api(path,o={}){const r=await fetch("https://api.spotify.com/v1"+path,{...o,headers:{Authorization:"Bearer "+localStorage.getItem("spotify_access_token"),"Content-Type":"application/json",...(o.headers||{})}});const t=await r.text();if(!r.ok)throw new Error(path+" failed: "+t);return t?JSON.parse(t):{}}
function clean(s){return s.replace(/\s*\([^)]*(mix|version|remix|club|vocal|drumapella)[^)]*\)\s*/ig," ").replace(/\s+/g," ").trim()}
async function searchTrack(a,t){for(const q of [`track:"${t}" artist:"${a}"`,`${a} ${t}`,`${a} ${clean(t)}`]){const x=await api("/search?type=track&limit=1&q="+encodeURIComponent(q));if(x.tracks.items[0])return x.tracks.items[0].uri}return null}
async function createAll(){setLog("Starting.");try{const me=await api("/me");log("Connected as: "+(me.display_name||me.id));log("Spotify account id used: "+me.id);for(const pl of playlists){log("\nCreating playlist: "+pl.name);const created=await api("/users/"+encodeURIComponent(me.id)+"/playlists",{method:"POST",body:JSON.stringify({name:pl.name,public:false,description:"Created from image tracklist"})});let uris=[],miss=[];for(const [a,t] of pl.tracks){const u=await searchTrack(a,t);if(u){uris.push(u);log("Matched: "+a+" - "+t)}else{miss.push(a+" - "+t);log("MISSED: "+a+" - "+t)}}await api("/playlists/"+created.id+"/tracks",{method:"POST",body:JSON.stringify({uris})});log("Added "+uris.length+" tracks to "+pl.name);if(miss.length)log("Missed:\n"+miss.join("\n"))}log("\nDONE. Check Spotify Library > Playlists.")}catch(e){log("ERROR: "+e.message+"\n\nIf this still says 403: tap Reset saved login, then Log in to Spotify again.")}}
callback();
</script></body></html>
